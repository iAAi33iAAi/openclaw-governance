version: '3.9'

services:

  api-gateway:
      build:
            context: ../../backend/api-gateway
                  dockerfile: Dockerfile
                      ports: ["4000:4000"]
                          environment:
                                NODE_ENV: development
                                      REDIS_URL: redis://redis:6379
                                            POSTGRES_URL: postgresql://openclaw:sovereignty@postgres:5432/openclaw
                                                  JWT_SECRET: ${JWT_SECRET}
                                                        LOVE_QUALITY_THRESHOLD: 0.85
                                                            depends_on: [redis, postgres, love-quality]
                                                                restart: unless-stopped

                                                                  love-quality:
                                                                      build:
                                                                            context: ../../backend/love-quality
                                                                                  dockerfile: Dockerfile
                                                                                      ports: ["5001:5001"]
                                                                                          environment:
                                                                                                LOVE_QUALITY_THRESHOLD: 0.85
                                                                                                      SOVEREIGNTY_MODE: strict
                                                                                                          restart: unless-stopped

                                                                                                            consensus-engine:
                                                                                                                build:
                                                                                                                      context: ../../backend/consensus-engine
                                                                                                                            dockerfile: Dockerfile
                                                                                                                                ports: ["5002:5002"]
                                                                                                                                    environment:
                                                                                                                                          CONSENSUS_DIMENSIONS: 12
                                                                                                                                                QUORUM_THRESHOLD: 0.67
                                                                                                                                                    restart: unless-stopped

                                                                                                                                                      colony-agent-1:
                                                                                                                                                          build:
                                                                                                                                                                context: ../../backend/colony-agents/agent-1-strategic
                                                                                                                                                                    environment:
                                                                                                                                                                          AGENT_ID: strategic
                                                                                                                                                                                COLONY_ID: colony-001
                                                                                                                                                                                    restart: unless-stopped

                                                                                                                                                                                      colony-agent-6:
                                                                                                                                                                                          build:
                                                                                                                                                                                                context: ../../backend/colony-agents/agent-6-quality
                                                                                                                                                                                                    environment:
                                                                                                                                                                                                          AGENT_ID: quality
                                                                                                                                                                                                                LOVE_QUALITY_THRESHOLD: 0.85
                                                                                                                                                                                                                    restart: unless-stopped

                                                                                                                                                                                                                      aethel-grid:
                                                                                                                                                                                                                          build:
                                                                                                                                                                                                                                context: ../../backend/aethel-grid
                                                                                                                                                                                                                                      dockerfile: Dockerfile
                                                                                                                                                                                                                                          ports: ["8080:8080"]
                                                                                                                                                                                                                                              environment:
                                                                                                                                                                                                                                                    AETHEL_SAFETY_MODE: strict
                                                                                                                                                                                                                                                          SOVEREIGNTY_VALIDATION: "true"
                                                                                                                                                                                                                                                              restart: unless-stopped

                                                                                                                                                                                                                                                                frontend-web:
                                                                                                                                                                                                                                                                    build:
                                                                                                                                                                                                                                                                          context: ../../frontend/web
                                                                                                                                                                                                                                                                                dockerfile: Dockerfile
                                                                                                                                                                                                                                                                                    ports: ["3000:3000"]
                                                                                                                                                                                                                                                                                        environment:
                                                                                                                                                                                                                                                                                              VITE_API_URL: http://localhost:4000
                                                                                                                                                                                                                                                                                                  depends_on: [api-gateway]
                                                                                                                                                                                                                                                                                                      restart: unless-stopped

                                                                                                                                                                                                                                                                                                        redis:
                                                                                                                                                                                                                                                                                                            image: redis:7-alpine
                                                                                                                                                                                                                                                                                                                ports: ["6379:6379"]
                                                                                                                                                                                                                                                                                                                    volumes:
                                                                                                                                                                                                                                                                                                                          - redis-data:/data
                                                                                                                                                                                                                                                                                                                              restart: unless-stopped

                                                                                                                                                                                                                                                                                                                                postgres:
                                                                                                                                                                                                                                                                                                                                    image: postgres:15-alpine
                                                                                                                                                                                                                                                                                                                                        environment:
                                                                                                                                                                                                                                                                                                                                              POSTGRES_DB: openclaw
                                                                                                                                                                                                                                                                                                                                                    POSTGRES_USER: openclaw
                                                                                                                                                                                                                                                                                                                                                          POSTGRES_PASSWORD: sovereignty
                                                                                                                                                                                                                                                                                                                                                              ports: ["5432:5432"]
                                                                                                                                                                                                                                                                                                                                                                  volumes:
                                                                                                                                                                                                                                                                                                                                                                        - postgres-data:/var/lib/postgresql/data
                                                                                                                                                                                                                                                                                                                                                                            restart: unless-stopped

                                                                                                                                                                                                                                                                                                                                                                              prometheus:
                                                                                                                                                                                                                                                                                                                                                                                  image: prom/prometheus:latest
                                                                                                                                                                                                                                                                                                                                                                                      ports: ["9090:9090"]
                                                                                                                                                                                                                                                                                                                                                                                          volumes:
                                                                                                                                                                                                                                                                                                                                                                                                - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
                                                                                                                                                                                                                                                                                                                                                                                                    restart: unless-stopped

                                                                                                                                                                                                                                                                                                                                                                                                      grafana:
                                                                                                                                                                                                                                                                                                                                                                                                          image: grafana/grafana:latest
                                                                                                                                                                                                                                                                                                                                                                                                              ports: ["3001:3000"]
                                                                                                                                                                                                                                                                                                                                                                                                                  environment:
                                                                                                                                                                                                                                                                                                                                                                                                                        GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-openclaw}
                                                                                                                                                                                                                                                                                                                                                                                                                            volumes:
                                                                                                                                                                                                                                                                                                                                                                                                                                  - grafana-data:/var/lib/grafana
                                                                                                                                                                                                                                                                                                                                                                                                                                      restart: unless-stopped

                                                                                                                                                                                                                                                                                                                                                                                                                                      volumes:
                                                                                                                                                                                                                                                                                                                                                                                                                                        redis-data:
                                                                                                                                                                                                                                                                                                                                                                                                                                          postgres-data:
                                                                                                                                                                                                                                                                                                                                                                                                                                            grafana-data: