apiVersion: v1
kind: Namespacemetadata:
  name: openclaw-colony-agents
    labels:
        app.kubernetes.io/name: openclaw-colony-agents    sovereignty: preserved    agent-count: "7"
            love-quality: enabled
              annotations:
                  openclaw.io/flow-version: "1.0"
                      openclaw.io/description: "7-Agent Colony coordination namespace"
                          openclaw.io/agents: "strategic,knowledge,creative,technical,social,quality,integration"
                          ---
                          apiVersion: v1
                          kind: ResourceQuotametadata:  name: colony-agents-quota
                            namespace: openclaw-colony-agents
                            spec:
                              hard:
                                  requests.cpu: "8"
                                      requests.memory: 16Gi
                                          limits.cpu: "16"
                                              limits.memory: 32Gi
                                                  pods: "50"
                                                      services: "20"
                                                      ---
                                                      apiVersion: v1
                                                      kind: ConfigMap
                                                      metadata:
                                                        name: colony-agent-config
                                                          namespace: openclaw-colony-openclaw-colony-agentsdata:  QUORUM_THRESHOLD: "0.67"
                                                            LOVE_QUALITY_THRESHOLD: "0.85"
                                                              SOVEREIGNTY_MODE: strict
                                                                AGENT_COUNT: "7"
                                                                  AGENT_1_ROLE: strategic-coordinator
                                                                    AGENT_2_ROLE: knowledge-synthesizer
                                                                      AGENT_3_ROLE: creative-innovator
                                                                        AGENT_4_ROLE: technical-implementer
                                                                          AGENT_5_ROLE: social-harmonizer
                                                                            AGENT_6_ROLE: quality-guardian
                                                                              AGENT_7_ROLE: integration-weaver
                                                                              ---
                                                                              apiVersion: networking.k8s.io/v1kind: NetworkPolicy
                                                                              metadata:
                                                                                name: colony-agents-network-policy
                                                                                  namespace: openclaw-colony-agent-configspec:
                                                                                    podSelector: {}
                                                                                      policyTypes:
                                                                                          - Ingress
                                                                                              - Egress
                                                                                                ingress:    - from:
                                                                                                        - namespaceSelector:
                                                                                                                    matchLabels:
                                                                                                                                  sovereignty: preserved
                                                                                                                                    egress:
                                                                                                                                        - to:
                                                                                                                                                - namespaceSelector:
                                                                                                                                                            matchLabels:
                                                                                                                                                                          sovereignty: preserved